<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mauro Peña — Sistemas de Captación & Conversión para Real Estate · Punta del Este</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<!-- TIPOGRAFÍAS -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">

<style>

/* ============ TOKENS PREMIUM ============ */
:root{
  --bg:#F8F6F1;
  --bg-dark:#0B0F17;
  --ink:#0E1420;
  --ink-soft:#5C6472;
  --line:rgba(14,20,32,0.12);
  --clay:#B0764A;

  --ease:cubic-bezier(.22,1,.36,1);
  --shadow:0 40px 90px -50px rgba(0,0,0,0.35);
}

*{box-sizing:border-box;}
html{scroll-behavior:smooth;}

body{
  margin:0;
  font-family:'Inter',system-ui;
  background:var(--bg);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

/* ============ TYPOGRAPHY PREMIUM ============ */
h1,h2{
  font-family:'Playfair Display', serif;
  letter-spacing:-0.03em;
}

h1{
  font-size:clamp(52px,7vw,96px);
  line-height:0.95;
}

h2{
  font-size:clamp(30px,4vw,54px);
  line-height:1.05;
}

/* ============ LAYOUT AIR ============ */
.wrap{
  max-width:1140px;
  margin:0 auto;
  padding:0 7vw;
}

.panel{
  min-height:100vh;
  display:flex;
  align-items:center;
  padding:160px 0;
  position:relative;
}

/* ============ HERO CINEMATIC ============ */
#hero{
  background:var(--bg-dark);
  color:white;
  overflow:hidden;
}

#hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:url('https://images.unsplash.com/photo-1505842465776-3b4953ca4f9b') center/cover no-repeat;
  opacity:0.35;
  filter:contrast(1.1) grayscale(20%);
  transform:scale(1.1);
}

#hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 20% 10%, rgba(176,118,74,0.35), transparent 40%),
    linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.85));
}

#hero .wrap{
  position:relative;
  z-index:2;
}

#hero h1 em{
  color:#C9A47A;
  font-style:normal;
}

/* ============ SECTIONS ============ */
.head{
  max-width:760px;
  margin-bottom:80px;
}

.lede{
  color:var(--ink-soft);
  font-size:18px;
  line-height:1.6;
}

/* ============ CARDS PREMIUM ============ */
.zone-card,
.seg-card,
.market-card{
  border:none;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(18px);
  border-radius:22px;
  box-shadow:0 30px 80px -60px rgba(0,0,0,0.25);
  transition:all .6s var(--ease);
}

.zone-card:hover{
  transform:translateY(-8px);
}

/* ============ KPI ============ */
.kpi{
  background:linear-gradient(145deg,#fff,#f3efe6);
  border:none;
  box-shadow:0 30px 70px -60px rgba(0,0,0,0.25);
}

/* ============ BUTTONS ============ */
.cta-btn,
.book-submit{
  background:var(--ink);
  border-radius:60px;
  padding:18px 42px;
  transition:all .4s var(--ease);
  color:white;
  border:none;
  cursor:pointer;
}

.cta-btn:hover,
.book-submit:hover{
  transform:translateY(-2px);
  opacity:.9;
}

/* ============ DIVIDERS ============ */
hr.fine{
  border:none;
  height:1px;
  background:linear-gradient(to right, transparent, rgba(0,0,0,0.15), transparent);
}

/* ============ REVEAL ============ */
.reveal{
  opacity:0;
  transform:translateY(28px);
  transition:all 1.1s var(--ease);
}

.reveal.is-visible{
  opacity:1;
  transform:none;
}

/* ============ TAGS ============ */
.tag{
  border:1px solid rgba(255,255,255,0.2);
  color:#fff;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
}

#hero .tag{
  border-color:rgba(201,164,122,0.3);
}

/* ============ PHOTO ZONES ============ */
.photo-zone{
  border-radius:26px;
  overflow:hidden;
  box-shadow:0 40px 90px -70px rgba(0,0,0,0.4);
}

/* ============ FUNNEL / GEO ============ */
.geo-pill,
.fun-chip{
  border-radius:999px;
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(12px);
  border:1px solid var(--line);
}

/* ============ SCROLL BAR ============ */
#progress{
  background:var(--clay);
  height:2px;
  position:fixed;
  top:0;
  left:0;
  z-index:99;
}

</style>
</head>

<body>

<div id="progress"></div>

<!-- ================= HERO ================= -->
<section class="panel" id="hero">
  <div class="wrap">
    <h1>
      Más propietarios.<br>
      Más reservas.<br>
      <em>Más compradores internacionales.</em>
    </h1>

    <p class="lede" style="color:#d7d0c5;">
      Sistemas de captación y conversión automatizados para real estate en Maldonado.
    </p>

    <div class="tag-row">
      <span class="tag">Captación automática</span>
      <span class="tag">IA conversacional</span>
      <span class="tag">Leads calificados</span>
    </div>
  </div>
</section>

</body>
</html>
